<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduConnect AI Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <!-- Main Container -->
    <div id="app" class="flex items-center justify-center min-h-screen p-4">
        
        <!-- Portal Selector -->
        <div id="landing-portal" class="w-full max-w-4xl grid md:grid-cols-2 gap-8">
            <div class="glass p-8 rounded-3xl shadow-xl text-center">
                <h2 class="text-2xl font-bold mb-4">Teacher Portal</h2>
                <button onclick="showLogin('teacher')" class="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold">Login as Teacher</button>
            </div>
            <div class="glass p-8 rounded-3xl shadow-xl text-center">
                <h2 class="text-2xl font-bold mb-4">Parent Portal</h2>
                <button onclick="showLogin('parent')" class="w-full py-3 bg-cyan-600 text-white rounded-xl font-bold">Login as Parent</button>
            </div>
        </div>

        <!-- Login Form (Hidden by default) -->
        <div id="login-screen" class="hidden w-full max-w-md glass p-8 rounded-3xl shadow-xl">
            <h2 id="login-title" class="text-xl font-bold mb-6 text-center">Login</h2>
            <form onsubmit="handleLogin(event)" class="space-y-4">
                <input type="text" id="user-input" placeholder="Enter ID/Username" class="w-full p-3 border rounded-xl" required>
                <input type="password" id="pass-input" placeholder="Password" class="w-full p-3 border rounded-xl" required>
                <button type="submit" class="w-full py-3 bg-slate-800 text-white rounded-xl font-bold">Sign In</button>
                <button type="button" onclick="location.reload()" class="w-full text-sm text-slate-500">Back</button>
            </form>
        </div>
    </div>

    <script>
        function showLogin(role) {
            document.getElementById('landing-portal').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('login-title').innerText = role.charAt(0).toUpperCase() + role.slice(1) + ' Login';
        }

        function handleLogin(e) {
            e.preventDefault();
            alert("Login successful! Redirecting to dashboard...");
            // Add your dashboard redirect logic here
        }
    </script>
</body>
</html>
